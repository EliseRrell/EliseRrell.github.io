<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elise Rellmar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #3f577d;
            color: #0D2948;
            font-family: 'Hanken Grotesk', sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .confirmation-card {
            width: min(560px, 100%);
            background-color: #f8fbff;
            box-shadow: 0 14px 30px rgba(10, 36, 67, 0.25);
            padding: 32px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-family: 'Playfair Display', serif;
            font-size: clamp(30px, 4.4vw, 44px);
            color: #1d3d63;
        }

        p {
            margin: 0;
            font-size: 18px;
            line-height: 1.6;
            color: #27486a;
        }

        button {
            margin-top: 22px;
            background-color: #365476;
            color: #f8fbff;
            border: none;
            padding: 10px 18px;
            font-family: 'Hanken Grotesk', sans-serif;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2d4968;
        }
    </style>
</head>

<body>
    <main class="confirmation-card">
        <h1>Thank you!</h1>
        <p>Your e-mail has been received. I will get back to you as soon as possible!</p>
        <button type="button" onclick="window.close()">Close window</button>
    </main>
</body>

</html>
